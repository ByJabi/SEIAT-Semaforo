<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEIAT - Monitoreo de Intersección</title>

<style>
    body{
        margin:0;
        background:#081120;
        font-family:Arial, Helvetica, sans-serif;
        color:white;
        overflow:hidden;
    }

    .panel{
        position:absolute;
        top:20px;
        left:20px;
        width:260px;
        background:#101b33;
        border:1px solid #1e3a5f;
        border-radius:10px;
        padding:15px;
        box-shadow:0 0 15px rgba(0,255,255,0.2);
    }

    .panel h2{
        margin-top:0;
        color:#00d9ff;
    }

    .estado{
        margin:10px 0;
        font-size:18px;
    }

    svg{
        width:100vw;
        height:100vh;
    }

    .sensor{
        fill:#333;
        stroke:white;
        stroke-width:2;
    }

    .sensor.activo{
        fill:#00ff00;
        filter: drop-shadow(0px 0px 8px lime);
    }

    .semaforo{
        stroke:#222;
        stroke-width:2;
    }

    .texto{
        fill:white;
        font-size:16px;
    }
</style>
</head>

<body>

<div class="panel">
    <h2>SEIAT</h2>

    <div class="estado">
        Estado:
        <span id="estadoTexto">Cargando...</span>
    </div>

    <div class="estado">
        Vía activa:
        <span id="viaActiva">-</span>
    </div>

    <div class="estado">
        Modo:
        <span id="modo">-</span>
    </div>
</div>

<svg viewBox="0 0 1200 700">

    <!-- CALLES -->

    <rect x="0" y="300" width="1200" height="100" fill="#555"/>
    <rect x="550" y="0" width="100" height="700" fill="#555"/>

    <!-- LÍNEAS -->
    <line x1="0" y1="350" x2="1200" y2="350"
          stroke="yellow" stroke-width="4" stroke-dasharray="20 10"/>

    <line x1="600" y1="0" x2="600" y2="700"
          stroke="yellow" stroke-width="4" stroke-dasharray="20 10"/>

    <!-- SEMÁFORO NORTE -->
    <circle id="norte_rojo" class="semaforo" cx="530" cy="240" r="12" fill="red"/>
    <circle id="norte_amarillo" class="semaforo" cx="530" cy="270" r="12" fill="#333"/>
    <circle id="norte_verde" class="semaforo" cx="530" cy="300" r="12" fill="#333"/>

    <!-- SEMÁFORO SUR -->
    <circle id="sur_rojo" class="semaforo" cx="670" cy="460" r="12" fill="red"/>
    <circle id="sur_amarillo" class="semaforo" cx="670" cy="490" r="12" fill="#333"/>
    <circle id="sur_verde" class="semaforo" cx="670" cy="520" r="12" fill="#333"/>

    <!-- SEMÁFORO OESTE -->
    <circle id="oeste_rojo" class="semaforo" cx="460" cy="430" r="12" fill="red"/>
    <circle id="oeste_amarillo" class="semaforo" cx="430" cy="430" r="12" fill="#333"/>
    <circle id="oeste_verde" class="semaforo" cx="400" cy="430" r="12" fill="#333"/>

    <!-- SEMÁFORO ESTE -->
    <circle id="este_rojo" class="semaforo" cx="740" cy="270" r="12" fill="red"/>
    <circle id="este_amarillo" class="semaforo" cx="770" cy="270" r="12" fill="#333"/>
    <circle id="este_verde" class="semaforo" cx="800" cy="270" r="12" fill="#333"/>

    <!-- SENSORES -->

    <circle id="s1" class="sensor" cx="600" cy="150" r="15"/>
    <text x="620" y="155" class="texto">S1</text>

    <circle id="s2" class="sensor" cx="250" cy="350" r="15"/>
    <text x="270" y="355" class="texto">S2</text>

    <circle id="s3" class="sensor" cx="600" cy="600" r="15"/>
    <text x="620" y="605" class="texto">S3</text>

    <circle id="s4" class="sensor" cx="950" cy="350" r="15"/>
    <text x="970" y="355" class="texto">S4</text>

    <circle id="s5" class="sensor" cx="850" cy="150" r="15"/>
    <text x="870" y="155" class="texto">S5</text>

</svg>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    databaseURL: "https://tu-proyecto-seiat-default-rtdb.firebaseio.com",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "XXXXXXXX",
    appId: "XXXXXXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const datosRef = ref(db, 'interseccion');

onValue(datosRef, (snapshot) => {

    const data = snapshot.val();

    if(!data) return;

    // PANEL
    document.getElementById("estadoTexto").innerText = data.estado;
    document.getElementById("viaActiva").innerText = data.via_activa;
    document.getElementById("modo").innerText =
        data.modo ? "Adaptativo" : "Manual";

    // SENSORES
    actualizarSensor("s1", data.s1);
    actualizarSensor("s2", data.s2);
    actualizarSensor("s3", data.s3);
    actualizarSensor("s4", data.s4);
    actualizarSensor("s5", data.s5);

    // SEMÁFOROS
    actualizarSemaforos(data.estado);

});

function actualizarSensor(id, activo){
    const sensor = document.getElementById(id);

    if(activo){
        sensor.classList.add("activo");
    }else{
        sensor.classList.remove("activo");
    }
}

function apagarTodos(){

    const colores = [
        "norte","sur","este","oeste"
    ];

    colores.forEach(dir => {

        document.getElementById(dir+"_rojo").setAttribute("fill","#333");
        document.getElementById(dir+"_amarillo").setAttribute("fill","#333");
        document.getElementById(dir+"_verde").setAttribute("fill","#333");

    });
}

function actualizarSemaforos(estado){

    apagarTodos();

    // EJEMPLOS
    // NORTE_VERDE
    // SUR_VERDE
    // ESTE_VERDE
    // OESTE_VERDE

    if(estado.includes("NORTE")){
        document.getElementById("norte_verde")
            .setAttribute("fill","lime");
    }

    if(estado.includes("SUR")){
        document.getElementById("sur_verde")
            .setAttribute("fill","lime");
    }

    if(estado.includes("ESTE")){
        document.getElementById("este_verde")
            .setAttribute("fill","lime");
    }

    if(estado.includes("OESTE")){
        document.getElementById("oeste_verde")
            .setAttribute("fill","lime");
    }

}

</script>

</body>
</html>
