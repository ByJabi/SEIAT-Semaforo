<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEIAT - Intersección Inteligente</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#081223;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

/* ===========================
   CONTENEDOR PRINCIPAL
=========================== */

.dashboard{
    width:100vw;
    height:100vh;
    display:flex;
}

/* ===========================
   PANEL IZQUIERDO
=========================== */

.left-panel{
    width:300px;
    background:#0d1b2d;
    padding:20px;
    border-right:2px solid #10345c;
}

.card{
    background:#12233d;
    border:1px solid #1f4b7a;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,255,255,0.1);
}

.card h2{
    color:#00d9ff;
    margin-bottom:10px;
    font-size:18px;
}

.estado{
    margin:10px 0;
    font-size:17px;
}

/* ===========================
   CENTRO
=========================== */

.center{
    flex:1;
    position:relative;
}

/* ===========================
   PANEL DERECHO
=========================== */

.right-panel{
    width:300px;
    background:#0d1b2d;
    padding:20px;
    border-left:2px solid #10345c;
}

/* ===========================
   SVG
=========================== */

svg{
    width:100%;
    height:100%;
}

/* CALLES */

.road{
    fill:#5b5b5b;
}

.line{
    stroke:yellow;
    stroke-width:4;
    stroke-dasharray:18 12;
}

/* SEMÁFOROS */

.light-off{
    fill:#222;
}

.red{
    fill:red;
    filter:drop-shadow(0 0 8px red);
}

.yellow{
    fill:yellow;
    filter:drop-shadow(0 0 8px yellow);
}

.green{
    fill:lime;
    filter:drop-shadow(0 0 8px lime);
}

/* SENSORES */

.sensor{
    fill:#333;
    stroke:white;
    stroke-width:2;
}

.sensor.active{
    fill:#00ff88;
    filter:drop-shadow(0 0 10px #00ff88);
}

/* TEXTO */

.label{
    fill:white;
    font-size:14px;
}

.title{
    position:absolute;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    color:#00d9ff;
    font-size:30px;
    font-weight:bold;
    text-shadow:0 0 10px cyan;
}

</style>
</head>

<body>

<div class="dashboard">

    <!-- PANEL IZQUIERDO -->

    <div class="left-panel">

        <div class="card">
            <h2>Estado General</h2>

            <div class="estado">
                Estado:
                <span id="estadoTexto">Cargando...</span>
            </div>

            <div class="estado">
                Vía activa:
                <span id="viaActiva">-</span>
            </div>

            <div class="estado">
                Modo:
                <span id="modoSistema">-</span>
            </div>

        </div>

        <div class="card">
            <h2>Sensores</h2>

            <div>S1 Norte Oeste</div>
            <div>S2 Oeste</div>
            <div>S3 Sur</div>
            <div>S4 Norte Este</div>
            <div>S5 Este</div>
        </div>

    </div>

    <!-- CENTRO -->

    <div class="center">

        <div class="title">
            SEIAT - INTERSECCIÓN INTELIGENTE
        </div>

<svg viewBox="0 0 1400 900">

    <!-- FONDO -->

    <rect width="1400" height="900" fill="#081223"/>

    <!-- CALLE HORIZONTAL -->

    <rect class="road"
          x="0"
          y="390"
          width="1400"
          height="120"/>

    <!-- CALLE VERTICAL -->

    <rect class="road"
          x="640"
          y="0"
          width="120"
          height="900"/>

    <!-- CALLES DIAGONALES -->

    <polygon class="road"
        points="
        520,390
        620,390
        350,120
        250,120
        "/>

    <polygon class="road"
        points="
        780,390
        880,390
        1150,120
        1050,120
        "/>

    <!-- LINEAS -->

    <line class="line"
          x1="0"
          y1="450"
          x2="1400"
          y2="450"/>

    <line class="line"
          x1="700"
          y1="0"
          x2="700"
          y2="900"/>

    <!-- SEMAFORO NORTE -->

    <circle id="norte_rojo"
            cx="620"
            cy="300"
            r="12"
            class="red"/>

    <circle id="norte_amarillo"
            cx="620"
            cy="330"
            r="12"
            class="light-off"/>

    <circle id="norte_verde"
            cx="620"
            cy="360"
            r="12"
            class="light-off"/>

    <!-- SEMAFORO SUR -->

    <circle id="sur_rojo"
            cx="780"
            cy="600"
            r="12"
            class="red"/>

    <circle id="sur_amarillo"
            cx="780"
            cy="630"
            r="12"
            class="light-off"/>

    <circle id="sur_verde"
            cx="780"
            cy="660"
            r="12"
            class="light-off"/>

    <!-- SEMAFORO OESTE -->

    <circle id="oeste_rojo"
            cx="520"
            cy="540"
            r="12"
            class="red"/>

    <circle id="oeste_amarillo"
            cx="490"
            cy="540"
            r="12"
            class="light-off"/>

    <circle id="oeste_verde"
            cx="460"
            cy="540"
            r="12"
            class="light-off"/>

    <!-- SEMAFORO ESTE -->

    <circle id="este_rojo"
            cx="880"
            cy="360"
            r="12"
            class="red"/>

    <circle id="este_amarillo"
            cx="910"
            cy="360"
            r="12"
            class="light-off"/>

    <circle id="este_verde"
            cx="940"
            cy="360"
            r="12"
            class="light-off"/>

    <!-- SENSORES -->

    <circle id="s1"
            class="sensor"
            cx="430"
            cy="220"
            r="16"/>

    <circle id="s2"
            class="sensor"
            cx="180"
            cy="450"
            r="16"/>

    <circle id="s3"
            class="sensor"
            cx="700"
            cy="780"
            r="16"/>

    <circle id="s4"
            class="sensor"
            cx="980"
            cy="220"
            r="16"/>

    <circle id="s5"
            class="sensor"
            cx="1180"
            cy="450"
            r="16"/>

</svg>

    </div>

    <!-- PANEL DERECHO -->

    <div class="right-panel">

        <div class="card">

            <h2>Estado Sensores</h2>

            <div id="sensorInfo">
                Esperando datos...
            </div>

        </div>

        <div class="card">

            <h2>Cloud</h2>

            <div>
                Firebase conectado
            </div>

        </div>

    </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ===========================
   CONFIG FIREBASE
=========================== */

const firebaseConfig = {

    apiKey: "TU_API_KEY",

    authDomain:
    "TU_PROYECTO.firebaseapp.com",

    databaseURL:
    "https://tu-proyecto-seiat-default-rtdb.firebaseio.com",

    projectId: "TU_PROYECTO",

    storageBucket:
    "TU_PROYECTO.appspot.com",

    messagingSenderId: "XXXXXX",

    appId: "XXXXXX"

};

/* ===========================
   INICIAR FIREBASE
=========================== */

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const datosRef = ref(db, 'interseccion');

/* ===========================
   ESCUCHAR DATOS
=========================== */

onValue(datosRef, (snapshot)=>{

    const data = snapshot.val();

    if(!data) return;

    console.log(data);

    /* PANEL */

    document.getElementById("estadoTexto")
        .innerText = data.estado;

    document.getElementById("viaActiva")
        .innerText = data.via_activa;

    document.getElementById("modoSistema")
        .innerText =
        data.modo ? "Adaptativo" : "Manual";

    /* SENSORES */

    actualizarSensor("s1", data.s1);
    actualizarSensor("s2", data.s2);
    actualizarSensor("s3", data.s3);
    actualizarSensor("s4", data.s4);
    actualizarSensor("s5", data.s5);

    /* SEMAFOROS */

    actualizarSemaforos(data.estado);

});

/* ===========================
   SENSOR
=========================== */

function actualizarSensor(id, activo){

    const sensor =
        document.getElementById(id);

    if(activo){

        sensor.classList.add("active");

    }else{

        sensor.classList.remove("active");

    }

}

/* ===========================
   APAGAR SEMAFOROS
=========================== */

function apagarTodos(){

    const ids = [

        "norte_rojo",
        "norte_amarillo",
        "norte_verde",

        "sur_rojo",
        "sur_amarillo",
        "sur_verde",

        "este_rojo",
        "este_amarillo",
        "este_verde",

        "oeste_rojo",
        "oeste_amarillo",
        "oeste_verde"

    ];

    ids.forEach(id=>{

        document.getElementById(id)
            .setAttribute("class","light-off");

    });

}

/* ===========================
   SEMAFOROS
=========================== */

function actualizarSemaforos(estado){

    apagarTodos();

    if(estado.includes("NORTE")){

        document.getElementById("norte_verde")
            .setAttribute("class","green");

    }

    if(estado.includes("SUR")){

        document.getElementById("sur_verde")
            .setAttribute("class","green");

    }

    if(estado.includes("ESTE")){

        document.getElementById("este_verde")
            .setAttribute("class","green");

    }

    if(estado.includes("OESTE")){

        document.getElementById("oeste_verde")
            .setAttribute("class","green");

    }

}

</script>

</body>
</html>
